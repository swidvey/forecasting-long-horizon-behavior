# Forecast horizon structure (settled in the build plan, section 4).
# Buckets must exactly partition 1..max_horizon_days -- validated by
# forecasting.config.HorizonsConfig at load time.
max_horizon_days: 180
buckets:
  - name: H1
    start_day: 1
    end_day: 7
  - name: H2
    start_day: 8
    end_day: 30
  - name: H3
    start_day: 31
    end_day: 90
  - name: H4
    start_day: 91
    end_day: 180
