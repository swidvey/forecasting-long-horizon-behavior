# Terraform CI: fmt/validate/plan on infra PRs, apply on merge to main.
# Authenticates to GCP via Workload Identity Federation -- no stored keys.
# NOTE: id-token: write is what lets this workflow request GitHub's OIDC token.
name: terraform

on:
  pull_request:
    paths: ["infra/**"]
  push:
    branches: [main]
    paths: ["infra/**"]

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: "true"

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/envs/prod
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: projects/278873715081/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: terraform-sa@forecasting-lhb-prod.iam.gserviceaccount.com

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: "~1.15"

      - name: Format check
        run: terraform fmt -check -recursive ../..

      - name: Init
        run: terraform init -input=false

      - name: Validate
        run: terraform validate

      - name: Plan (PRs)
        if: github.event_name == 'pull_request'
        run: terraform plan -input=false -no-color

      - name: Apply (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -input=false -no-color -auto-approve
