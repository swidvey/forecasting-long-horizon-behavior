# CI: lint, type-check, test. Runs on every PR and on pushes to main.
# Security posture (build plan section 9): actions pinned to commit SHAs,
# minimal token permissions, dependencies installed from hash-pinned lockfile.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Install dependencies (hash-verified)
        run: |
          python -m pip install --require-hashes -r requirements/dev-requirements.txt
          python -m pip install --no-deps -e .

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Type-check (mypy)
        run: mypy

      - name: Test (pytest)
        run: pytest
